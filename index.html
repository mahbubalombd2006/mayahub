<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maya Hub - Freelancer Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(rgba(248,250,252,0.92), rgba(241,245,249,0.95)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#0f172a;
min-height:100vh;
overflow-x:hidden;
}

/* ===== HEADER ===== */
.main-header{
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(15,23,42,0.06);
box-shadow:0 2px 12px rgba(0,0,0,0.04);
}

.header-container{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 14px;
gap:10px;
}

.logo{
display:flex;
align-items:center;
gap:6px;
font-weight:700;
color:#2563eb;
font-size:18px;
white-space:nowrap;
}

.search-box{
flex:1;
display:flex;
align-items:center;
gap:8px;
background:white;
padding:8px 12px;
border-radius:12px;
border:1px solid rgba(15,23,42,0.08);
}

.search-box input{
width:100%;
border:none;
outline:none;
background:transparent;
font-size:14px;
}

.top-navbar{
display:flex;
gap:8px;
}

.top-navbar a{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:white;
border-radius:10px;
border:1px solid rgba(15,23,42,0.06);
color:#334155;
text-decoration:none;
transition:.3s;
}

.top-navbar a:hover{
background:#2563eb;
color:white;
}

/* ===== CONTAINER ===== */
.container{
max-width:1100px;
margin:auto;
padding:25px 14px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.95);
padding:18px;
border-radius:18px;
margin-bottom:14px;

display:flex;
justify-content:space-between;
align-items:center;

border:1px solid rgba(15,23,42,0.06);
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
border-color:#60a5fa;
}

/* LEFT */
.user-info h3{
color:#1d4ed8;
margin-bottom:4px;
}

.user-info p{
color:#64748b;
font-size:13px;
}

.user-id{
display:inline-block;
margin-top:6px;
background:#eef2ff;
color:#1d4ed8;
padding:4px 10px;
border-radius:10px;
font-size:12px;
font-weight:600;
}

/* RIGHT */
.card-right{
display:flex;
align-items:center;
gap:10px;
}

.open-btn{
background:#2563eb;
color:white;
padding:8px 14px;
border-radius:10px;
text-decoration:none;
font-size:13px;
font-weight:600;
}

.open-btn:hover{
background:#1d4ed8;
}

.linkedin{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#0a66c2;
color:white;
text-decoration:none;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:25px;
margin-top:40px;
background:rgba(255,255,255,0.9);
border-top:1px solid rgba(15,23,42,0.06);
color:#64748b;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="main-header">

<div class="header-container">

<div class="logo">
<i class="fa-solid fa-briefcase"></i>
Maya Hub
</div>

<!-- SEARCH -->
<div class="search-box">
<i class="fa-solid fa-magnifying-glass"></i>
<input type="text" id="searchInput" placeholder="Search name, role or ID...">
</div>

<nav class="top-navbar">
<a href="index.html"><i class="fa-solid fa-house"></i></a>
<a href="about.html"><i class="fa-solid fa-circle-info"></i></a>
<a href="privacy-policy.html"><i class="fa-solid fa-shield-halved"></i></a>
<a href="terms.html"><i class="fa-solid fa-file-contract"></i></a>
<a href="contact.html"><i class="fa-solid fa-envelope"></i></a>
<a href="faq.html"><i class="fa-solid fa-circle-question"></i></a>
</nav>

</div>

</header>

<!-- ===== CONTENT ===== -->
<div class="container" id="userContainer">

<!-- CARD -->
<div class="card">
<div class="user-info">
<h3>Mahbub Alom</h3>
<p>Web Developer</p>
<span class="user-id">ID: MH-01</span>
</div>
<div class="card-right">
<a class="linkedin" href="https://www.linkedin.com/in/mahbubalombd2006/"><i class="fa-brands fa-linkedin"></i></a>
<a class="open-btn" href="https://www.linkedin.com/in/mahbubalombd2006/">Open</a>
</div>
</div>


<div class="card">
<div class="user-info">
<h3>Javaria Mehdi</h3>
<p>SEO Writer</p>
<span class="user-id">ID: MH-02</span>
</div>
<div class="card-right">
<a class="linkedin" href="https://www.linkedin.com/in/javaria-mehdi/"><i class="fa-brands fa-linkedin"></i></a>
<a class="open-btn" href="https://www.linkedin.com/in/javaria-mehdi/">Open</a>
</div>
</div>



<!-- ===== FOOTER ===== -->
<footer>
<p>© 2026 Maya Hub • All Rights Reserved</p>
</footer>

<!-- ===== SEARCH SCRIPT ===== -->
<script>

const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function(){

let value = searchInput.value.toLowerCase();

cards.forEach(card => {

let text = card.innerText.toLowerCase();

if(text.includes(value)){
card.style.display = "flex";
}else{
card.style.display = "none";
}

});

});

</script>

</body>
</html>
