<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Contact - Maya Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
font-size:clamp(14px, 1.2vw, 16px);
}

body{
background:linear-gradient(rgba(248,250,252,0.92), rgba(241,245,249,0.95)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
display:flex;
flex-direction:column;
overflow-x:hidden;
}

/* ===== HEADER ===== */
.main-header{
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(15,23,42,0.06);
}

.header-container{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
gap:8px;
flex-wrap:nowrap;
overflow:hidden;
}

.logo{
display:flex;
align-items:center;
gap:6px;
font-weight:700;
color:#2563eb;
font-size:clamp(14px, 2.5vw, 18px);
white-space:nowrap;
}

.top-navbar{
display:flex;
gap:6px;
flex-shrink:0;
}

.top-navbar a{
width:clamp(26px, 6vw, 36px);
height:clamp(26px, 6vw, 36px);
display:flex;
align-items:center;
justify-content:center;
background:white;
border-radius:10px;
border:1px solid rgba(15,23,42,0.06);
color:#334155;
text-decoration:none;
font-size:clamp(12px, 2vw, 16px);
transition:.2s;
}

.top-navbar a:hover{
background:#2563eb;
color:white;
}

/* ===== CONTACT ===== */
.container{
max-width:900px;
margin:12px auto;
padding:0 10px;
flex:1;
}

/* info cards */
.card{
background:rgba(255,255,255,0.95);
padding:16px;
border-radius:18px;
margin-bottom:12px;
border:1px solid rgba(15,23,42,0.06);
box-shadow:0 6px 18px rgba(0,0,0,0.05);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
color:#1d4ed8;
font-size:15px;
margin-bottom:8px;
display:flex;
gap:8px;
align-items:center;
}

.card p{
color:#475569;
font-size:14px;
line-height:1.7;
}

/* contact form */
form{
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
}

input, textarea{
padding:10px;
border-radius:10px;
border:1px solid rgba(15,23,42,0.15);
font-family:'Poppins',sans-serif;
font-size:14px;
outline:none;
}

textarea{
min-height:100px;
resize:none;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#1d4ed8;
}

/* badge */
.badge{
display:inline-block;
margin-top:10px;
padding:4px 10px;
border-radius:10px;
background:#eef2ff;
color:#1d4ed8;
font-size:12px;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:18px;
color:#64748b;
margin-top:auto;
background:rgba(255,255,255,0.8);
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="main-header">
<div class="header-container">

<div class="logo">
<i class="fa-solid fa-briefcase"></i>
Maya Hub
</div>

<nav class="top-navbar">
<a href="index.html"><i class="fa-solid fa-house"></i></a>
<a href="about.html"><i class="fa-solid fa-circle-info"></i></a>
<a href="privacy-policy.html"><i class="fa-solid fa-shield-halved"></i></a>
<a href="terms.html"><i class="fa-solid fa-file-contract"></i></a>
<a href="contact.html"><i class="fa-solid fa-envelope"></i></a>
<a href="faq.html"><i class="fa-solid fa-circle-question"></i></a>
</nav>

</div>
</header>

<!-- CONTACT CONTENT -->
<div class="container">

<!-- INFO CARD -->
<div class="card">
<h3><i class="fa-solid fa-envelope"></i> Contact Us</h3>
<p>
If you have any questions, suggestions, or support needs, feel free to send us a message. We will reply as soon as possible.
</p>
<span class="badge">Support Team</span>
</div>

<!-- CONTACT FORM CARD -->
<div class="card">
<h3><i class="fa-solid fa-paper-plane"></i> Send Message</h3>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message..." required></textarea>
<button type="submit">Send Message</button>
</form>

<span class="badge">We reply fast 🚀</span>
</div>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 Maya Hub • All Rights Reserved</p>
</footer>

</body>
</html>
