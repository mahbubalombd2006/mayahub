<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Maya Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(rgba(248,250,252,0.92), rgba(241,245,249,0.95)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#0f172a;
overflow-x:hidden;
}

/* ===== HEADER ===== */
.main-header{
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(15,23,42,0.06);
box-shadow:0 2px 12px rgba(0,0,0,0.04);
}

.header-container{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 14px;
gap:10px;
}

.logo{
display:flex;
align-items:center;
gap:6px;
font-weight:700;
color:#2563eb;
font-size:18px;
white-space:nowrap;
}

.top-navbar{
display:flex;
gap:8px;
}

.top-navbar a{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:white;
border-radius:10px;
border:1px solid rgba(15,23,42,0.06);
color:#334155;
text-decoration:none;
transition:.3s;
}

.top-navbar a:hover{
background:#2563eb;
color:white;
}

/* ===== CONTAINER ===== */
.container{
max-width:900px;
margin:auto;
padding:25px 14px;
}

/* ===== TITLE ===== */
.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
font-size:42px;
color:#2563eb;
}

.title p{
color:#64748b;
margin-top:10px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.96);
padding:22px;
border-radius:18px;
margin-bottom:16px;

border:1px solid rgba(15,23,42,0.06);
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
border-color:#60a5fa;
}

.card h3{
color:#1d4ed8;
margin-bottom:10px;
}

.card p{
color:#64748b;
line-height:1.8;
font-size:14px;
}

/* ===== CONTACT GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:14px;
margin-top:20px;
}

/* ===== INPUT FORM ===== */
input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(15,23,42,0.15);
outline:none;
font-family:'Poppins',sans-serif;
}

textarea{
min-height:120px;
resize:none;
}

button{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

/* ===== INFO BOX ===== */
.info-box{
display:flex;
flex-direction:column;
gap:10px;
}

.info-item{
display:flex;
align-items:center;
gap:10px;
color:#334155;
font-size:14px;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:25px;
margin-top:40px;
background:rgba(255,255,255,0.9);
border-top:1px solid rgba(15,23,42,0.06);
color:#64748b;
}

/* ===== MOBILE SAFE (ZOOM FRIENDLY) ===== */
@media(max-width:600px){

.title h1{
font-size:32px;
}

.card{
padding:16px;
}

button{
font-size:14px;
}

}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="main-header">

<div class="header-container">

<div class="logo">
<i class="fa-solid fa-briefcase"></i>
Maya Hub
</div>

<nav class="top-navbar">
<a href="index.html"><i class="fa-solid fa-house"></i></a>
<a href="about.html"><i class="fa-solid fa-circle-info"></i></a>
<a href="privacy-policy.html"><i class="fa-solid fa-shield-halved"></i></a>
<a href="terms.html"><i class="fa-solid fa-file-contract"></i></a>
<a href="contact.html"><i class="fa-solid fa-envelope"></i></a>
<a href="faq.html"><i class="fa-solid fa-circle-question"></i></a>
</nav>

</div>

</header>

<!-- ===== CONTENT ===== -->
<div class="container">

<div class="title">
<h1>Contact Us</h1>
<p>We are here to help you anytime</p>
</div>

<div class="grid">

<!-- FORM CARD -->
<div class="card">

<h3>Send Message</h3>

<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea placeholder="Write your message..."></textarea>

<button>Send Message</button>

</div>

<!-- INFO CARD -->
<div class="card info-box">

<h3>Contact Info</h3>

<div class="info-item">
<i class="fa-solid fa-envelope"></i>
mahbubalombd2006@gmail.com
</div>

<div class="info-item">
<i class="fa-solid fa-phone"></i>
+880 1709842818
</div>

<div class="info-item">
<i class="fa-solid fa-location-dot"></i>
Sylhet, Bangladesh
</div>

<div class="info-item">
<i class="fa-solid fa-globe"></i>
https://mayahub.vercel.app
</div>

</div>

</div>

</div>

<!-- ===== FOOTER ===== -->
<footer>
<p>© 2026 Maya Hub • All Rights Reserved</p>
</footer>

</body>
</html>
